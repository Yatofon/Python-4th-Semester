version: '3.8'

services:
  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: teamfinder
      POSTGRES_USER: teamfinder_user
      POSTGRES_PASSWORD: teamfinder_password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teamfinder_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: 'True'
      SECRET_KEY: 'django-insecure-key-for-dev'
      DB_NAME: teamfinder
      DB_USER: teamfinder_user
      DB_PASSWORD: teamfinder_password
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: localhost,127.0.0.1

volumes:
  postgres_data:
  static_volume:
  media_volume: