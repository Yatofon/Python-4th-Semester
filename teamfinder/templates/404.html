{% extends 'base.html' %}
{% load static %}

{% block title %} - Страница не найдена{% endblock %}

{% block content %}
<div class="error-page">
    <div class="error-content">
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Страница не найдена</h2>
        <p class="error-description">Запрошенная страница не существует или была удалена</p>
        <a href="{% url 'projects:list' %}" class="btn btn--primary">Вернуться на главную</a>
    </div>
</div>
{% endblock %}
